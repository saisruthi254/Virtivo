<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtivo</title>

<style>

body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
color:white;
height:100vh;
background-image:url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f");
background-size:cover;
background-position:center;
}
.hero{
    background-size:cover;
    background-position:center;
}
    
    
.overlay{
background:rgba(0,0,0,0.6);
height:100%;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
}

.logo{
font-size:28px;
font-weight:bold;
}

.menu a{
color:white;
margin:0 15px;
text-decoration:none;
}

.login-btn{
background:transparent;
color:white;
padding:8px 18px;
border-radius:25px;
text-decoration:none;
border:2px solid white;
font-weight:500;
}

.login-btn:hover{
background:white;
color:black;
transition:0.3s;
}

.center{
height:80%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.center h1{
font-size: clamp(28px,6vw,60px);
max-width:800px;
}

.create-btn{
margin-top:25px;
background:#377ac7;
padding:14px 30px;
border-radius:30px;
text-decoration:none;
color:white;
font-weight:bold;
}

.create-btn:hover{
background:#377ac7;
}

.modal {
    display: none; 
    position: fixed; 
    z-index: 1000; 
    left: 0; top: 0; width: 100%; height: 100%; 
    background-color: rgba(0,0,0,0.85); 
    backdrop-filter: blur(8px);
    align-items: center; justify-content: center;
}


.modal-content {
    background: #111; 
    padding: 40px; 
    border-radius: 20px; 
    width: 80%; max-width: 500px; 
    color: white; 
    text-align: center;
    border: 1px solid #333;
}

.close-btn {
    float: right; font-size: 28px; cursor: pointer; color: #888;
}

</style>

</head>

<body>

<div class="overlay">

<nav>

<div class="logo">Virtivo</div>

<div class="menu">
<a href="javascript:void(0)" onclick="openModal('learn')">Learn</a>
<a href="javascript:void(0)" onclick="openModal('safety')">Safety</a>
<a href="javascript:void(0)" onclick="openModal('support')">Support</a>
<a class="login-btn" href="login.html">Login</a>
</div>

</nav>

<div class="center">

<h1>Learn What You Need.<br>Teach What You Know.</h1>

<a class="create-btn" href="signup.html">Create Account</a>

</div>

</div>
<div id="infoModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle" style="color: #6366f1;"></h2>
        <div id="modalText" style="margin-top: 20px; line-height: 1.6;"></div>
    </div>
</div>
<script>
    const modalData = {
        learn: { title: "Learn What You Need", text: "Virtivo helps users learn smarter by creating a focused and distraction-free environment where knowledge is shared through real human connections rather than passive content. Users can easily search for skills they want to learn, such as Java, Python, or design, and get connected with like-minded learners and mentors who share similar interests and goals. The platform encourages peer-to-peer learning through interactive communication, allowing users to collaborate, exchange ideas, and grow together in real time. With features like swipe-based skill discovery, personalized matching, and a community-driven approach, Virtivo transforms learning into an engaging, efficient, and meaningful experience where users not only consume knowledge but actively participate in building it." },
        safety: { title: "Your Safety Matters", text: "At Virtivo, user safety and trust are our top priorities, and the platform is designed to provide a secure and respectful environment for learning and collaboration. We ensure secure account authentication to protect user data and maintain privacy, while enforcing a strict zero-tolerance policy against harassment, spam, or any form of misuse. Users can view transparent profiles, including skills, interests, and feedback, before connecting with others, helping them make informed decisions. Additionally, features like report and block allow users to take immediate action if they encounter any inappropriate behavior, ensuring that the learning space remains safe, supportive, and comfortable for everyone." },
        support: { title: "How Can We Help?", text: "Virtivo is committed to supporting users throughout their learning journey by providing reliable and accessible assistance whenever needed. Users can reach out through email support for any queries, issues, or feedback, and receive timely responses from the team. The platform also aims to offer real-time assistance for quick problem resolution and includes a frequently asked questions section to help users find instant answers to common concerns. Whether it is a technical issue, guidance on using the platform, or general support, Virtivo ensures that help is always available, making the overall experience smooth, user-friendly, and dependable." }
    };

    function openModal(type) {
        document.getElementById('modalTitle').innerText = modalData[type].title;
        document.getElementById('modalText').innerText = modalData[type].text;
        document.getElementById('infoModal').style.display = "flex";
    }

    function closeModal() {
        document.getElementById('infoModal').style.display = "none";
    }

    
    window.onclick = function(event) {
        if (event.target == document.getElementById('infoModal')) {
            closeModal();
        }
    }
</script>
</body>
</html>
